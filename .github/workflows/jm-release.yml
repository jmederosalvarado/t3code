name: JM Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact fork commit to release
        required: false
        type: string
      source:
        description: Release trigger source
        required: false
        default: manual
        type: string

permissions:
  contents: read

concurrency:
  group: jm-release
  cancel-in-progress: false

jobs:
  preflight:
    name: Resolve release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}
          fetch-depth: 0

      - id: meta
        name: Resolve immutable release metadata
        shell: bash
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          release_sha="$(git rev-parse HEAD)"
          if [[ -n "${EXPECTED_SHA:-}" && "$release_sha" != "$EXPECTED_SHA" ]]; then
            echo "Expected $EXPECTED_SHA but checked out $release_sha." >&2
            exit 1
          fi

          version="1.0.${GITHUB_RUN_NUMBER}"
          {
            echo "version=$version"
            echo "tag=jm-v$version"
            echo "ref=$release_sha"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      T3CODE_DESKTOP_UPDATE_REPOSITORY: jmederosalvarado/t3code
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-26
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-26-intel
            platform: mac
            target: dmg
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Align package versions
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Install ImageMagick
        if: matrix.platform == 'linux'
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

      - name: Build desktop artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            if [[ -n "${CSC_LINK:-}" && -n "${CSC_KEY_PASSWORD:-}" && -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              args+=(--signed)
              echo "macOS signing and notarization enabled."
            else
              echo "macOS artifact will be unsigned until Apple signing secrets are configured."
            fi
          fi

          vp run dist:desktop:artifact "${args[@]}"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.blockmap" \
            "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            for manifest in release-publish/*-mac.yml; do
              mv "$manifest" "${manifest%.yml}-${{ matrix.arch }}.yml"
            done
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jm-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=@t3tools/scripts...

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: jm-desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        run: |
          shopt -s nullglob
          for x64_manifest in release-assets/*-mac-x64.yml; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ -f "$arm64_manifest" ]]; then
              node scripts/merge-update-manifests.ts --platform mac "$arm64_manifest" "$x64_manifest"
              rm -f "$x64_manifest"
            fi
          done

      - name: Create release notes
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          RELEASE_SHA: ${{ needs.preflight.outputs.ref }}
          RELEASE_SOURCE: ${{ inputs.source || github.event_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/upstream:refs/remotes/origin/upstream
          upstream_sha="$(git rev-parse origin/upstream)"
          notes="$RUNNER_TEMP/jm-release-notes.md"
          {
            echo "Personal T3 Code build based on the latest synchronized upstream source."
            echo
            echo "- Fork version: \`$VERSION\`"
            echo "- Fork commit: \`$RELEASE_SHA\`"
            echo "- Upstream commit: \`$upstream_sha\`"
            echo "- Trigger: \`$RELEASE_SOURCE\`"
            echo
            echo "### Custom patch stack"
            echo
            # shellcheck disable=SC2016
            git log --format='- %s (`%h`)' "${upstream_sha}..${RELEASE_SHA}"
          } > "$notes"
          echo "notes=$notes" >> "$GITHUB_ENV"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: T3 Code JM v${{ needs.preflight.outputs.version }}
          body_path: ${{ env.notes }}
          prerelease: false
          make_latest: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: true
          token: ${{ github.token }}
